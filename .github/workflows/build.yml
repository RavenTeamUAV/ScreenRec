name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install opencv-python numpy pyautogui Pillow pynput pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name ScreenRec --hidden-import pynput.keyboard._win32 --hidden-import pynput.mouse._win32 main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ScreenRec-windows
          path: dist/ScreenRec.exe
